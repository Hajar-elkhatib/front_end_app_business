apiVersion: apps/v1
kind: Deployment
metadata:
  name: ia-deployment
  namespace: default
  labels:
    app: model-ia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-ia
  template:
    metadata:
      labels:
        app: model-ia
    spec:
      containers:
      - name: ia-container
        image: python:3.9-slim # L'image pour votre API d'Intelligence Artificielle
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: ia-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: model-ia
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 31565 # <--- Le port public de l'IA vu sur votre Azure !
