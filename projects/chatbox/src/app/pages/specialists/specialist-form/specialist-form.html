<div class="container py-8 max-w-3xl">
  <div class="flex items-center gap-4 mb-8">
    <button class="icon-btn border border-color rounded-full p-2 hover:bg-gray-100" (click)="null" routerLink="/specialists">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div>
      <h1 class="text-3xl font-bold">{{isEditMode ? 'Edit Specialist' : 'Create Specialist Profile'}}</h1>
      <p class="text-secondary text-sm">Fill in the details to {{isEditMode ? 'update your' : 'setup a new'}} specialist account.</p>
    </div>
  </div>

  <form [formGroup]="specForm" (ngSubmit)="onSubmit()" class="card glass flex-col gap-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="flex flex-col gap-2">
        <label class="text-sm font-medium">Full Name</label>
        <input type="text" formControlName="fullName" class="input" placeholder="e.g. Jane Doe">
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-sm font-medium">Expertise Domain</label>
        <select formControlName="expertiseDomain" class="input">
          <option value="">Select Domain...</option>
          <option value="AI Engineering">AI Engineering</option>
          <option value="Frontend Architecture">Frontend Architecture</option>
          <option value="Cloud DevOps">Cloud DevOps</option>
          <option value="Backend Development">Backend Development</option>
          <option value="UI/UX Design">UI/UX Design</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="flex flex-col gap-2">
        <label class="text-sm font-medium">Hourly Rate ($)</label>
        <input type="number" formControlName="hourlyRate" class="input" placeholder="0">
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-sm font-medium">Years of Experience</label>
        <input type="number" formControlName="yearsExperience" class="input" placeholder="0">
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-sm font-medium">Location</label>
        <input type="text" formControlName="location" class="input" placeholder="e.g. Remote, USA">
      </div>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-sm font-medium">Skills (comma separated)</label>
      <input type="text" formControlName="skills" class="input" placeholder="e.g. Angular, Node.js, Python">
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-sm font-medium">Languages (comma separated)</label>
      <input type="text" formControlName="languages" class="input" placeholder="e.g. English, Spanish">
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-sm font-medium">Bio</label>
      <textarea formControlName="bio" class="input" rows="4" placeholder="Tell us about your professional background..."></textarea>
    </div>

    <div class="pt-4 border-t border-color flex justify-end gap-4">
      <button type="button" class="btn btn-secondary" routerLink="/specialists">Cancel</button>
      <button type="submit" class="btn btn-indigo" [disabled]="specForm.invalid || isLoading">
        <span *ngIf="!isLoading">{{isEditMode ? 'Save Changes' : 'Create Profile'}}</span>
        <span *ngIf="isLoading">Saving...</span>
      </button>
    </div>
  </form>
</div>
