<div class="chat-container card p-0 flex h-full border-subtle shadow-sm overflow-hidden">
  
  <!-- Sidebar Convos -->
  <div class="chat-sidebar border-r border-color flex-col bg-gray-50">
    <div class="p-4 border-b border-color bg-primary">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-semibold tracking-tight">Messages</h2>
        <button class="icon-btn hover-bg-gray text-xs rounded-full shadow-sm border border-color"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      </div>
      <div class="relative">
        <svg class="absolute left-3 top-3 text-muted" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="input w-full pl-9 bg-gray-50 border-transparent focus-border-indigo" placeholder="Search...">
      </div>
    </div>
    
    <div class="convo-list flex-1 overflow-y">
       <div *ngFor="let convo of conversations" class="convo-item flex items-start gap-3 p-4 border-b border-color cursor-pointer transition-colors" [ngClass]="{'active bg-white': convo.active, 'hover-bg-white': !convo.active}">
         <div class="avatar relative mt-1 shrink-0">
           {{ convo.avatar }}
           <span *ngIf="convo.unread > 0" class="unread-dot relative"></span>
         </div>
         <div class="flex-1 min-w-0">
           <div class="flex justify-between items-center mb-1">
             <h4 class="font-medium text-sm truncate" [ngClass]="{'text-primary': convo.unread > 0, 'text-secondary': convo.unread === 0}">{{ convo.name }}</h4>
             <span class="text-xs" [ngClass]="convo.unread > 0 ? 'text-indigo font-medium' : 'text-muted'">{{ convo.time }}</span>
           </div>
           <p class="text-xs truncate" [ngClass]="convo.unread > 0 ? 'text-primary font-medium' : 'text-muted'">{{ convo.lastMessage }}</p>
         </div>
       </div>
    </div>
  </div>

  <!-- Main Chat Area -->
  <div class="chat-main flex-1 flex-col bg-primary">
    <!-- Header -->
    <div class="chat-header p-4 border-b border-color flex items-center justify-between">
       <div class="flex items-center gap-3">
         <div class="avatar">A</div>
         <div>
           <h3 class="font-semibold text-sm">Alex Rivera</h3>
           <div class="flex items-center gap-1.5 mt-0.5">
             <span class="w-1.5 h-1.5 rounded-full bg-success"></span>
             <p class="text-xs text-muted">Active now</p>
           </div>
         </div>
       </div>
       <div class="flex items-center gap-1">
         <button class="icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></button>
         <button class="icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></button>
         <div class="v-divider mx-2"></div>
         <button class="icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg></button>
       </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages flex-1 p-6 overflow-y flex-col gap-6 bg-gray-50 bg-pattern">
      <div class="text-center my-4"><span class="text-xs font-medium text-muted bg-white border border-color px-3 py-1 rounded-full shadow-sm">Today</span></div>
      
      <div *ngFor="let msg of messages" class="flex gap-3 max-w-2xl" [ngClass]="msg.isMe ? 'ml-auto reverse-row' : ''">
        <div class="avatar sm shrink-0 shadow-sm" *ngIf="!msg.isMe">{{ msg.avatar }}</div>
        <div class="flex flex-col" [ngClass]="msg.isMe ? 'items-end' : 'items-start'">
           <div class="message-bubble shadow-sm" [ngClass]="msg.isMe ? 'bg-indigo text-white border-transparent' : 'bg-white text-primary border-color border'">
              <p class="text-sm shadow-none leading-relaxed">{{ msg.text }}</p>
           </div>
           <span class="text-xs mt-1 font-medium" [ngClass]="msg.isMe ? 'text-muted mr-1' : 'text-muted ml-1'">{{ msg.time }}</span>
        </div>
      </div>
      
      <!-- Typing Indicator -->
      <div class="flex gap-3 max-w-2xl">
         <div class="avatar sm shrink-0 shadow-sm">A</div>
         <div class="message-bubble bg-white border border-color flex items-center gap-1.5 typing-indicator shadow-sm">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
         </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="chat-input p-4 bg-white border-t border-color flex items-end gap-3 z-10 shadow-up">
       <button class="icon-btn mb-1 text-muted"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
       <div class="flex-1 bg-gray-50 border border-color rounded-lg p-1.5 focus-within transition-all">
         <textarea class="w-full text-sm resize-none custom-scrollbar outline-none bg-transparent pt-2 px-2" placeholder="Write a message..." rows="1" style="min-height: 24px;"></textarea>
       </div>
       <button class="btn btn-indigo mb-1 rounded-lg p-2.5 flex items-center justify-center send-btn shadow-md">
         <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
       </button>
    </div>
  </div>

</div>
