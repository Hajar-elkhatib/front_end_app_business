<section class="form-page">
  <a routerLink="/reports" class="back-link">Back to reports</a>

  <div class="form-card">
    <header>
      <p class="kicker">Reports</p>
      <h1>{{isEditMode ? 'Open Report' : 'Create Report'}}</h1>
      <p>{{isEditMode ? 'Update the useful report information.' : 'Prepare a clear document to track your analysis.'}}</p>
    </header>

    <div *ngIf="isLoading" class="loading-state">
      <div class="spinner"></div>
      <p>Loading report...</p>
    </div>

    <form *ngIf="!isLoading" [formGroup]="form" (ngSubmit)="save()">
      <div class="form-grid">
        <label>
          <span>Project</span>
          <select class="input" formControlName="projectId">
            <option value="">Select a project</option>
            <option *ngFor="let project of projects" [value]="project.id">{{project.title}}</option>
          </select>
          <small *ngIf="isInvalid('projectId')">Select a project.</small>
        </label>

        <label>
          <span>Report type</span>
          <select class="input" formControlName="reportType">
            <option value="General">General</option>
            <option value="Market">Market</option>
            <option value="Financial">Financial</option>
            <option value="Technical">Product</option>
          </select>
        </label>
      </div>

      <label>
        <span>Title</span>
        <input class="input" type="text" formControlName="title" placeholder="Report title">
        <small *ngIf="isInvalid('title')">Title is required.</small>
      </label>

      <label>
        <span>Summary</span>
        <textarea class="input" rows="3" formControlName="summary" placeholder="Short report summary"></textarea>
      </label>

      <label>
        <span>Content</span>
        <textarea class="input" rows="8" formControlName="content" placeholder="Report content"></textarea>
        <small *ngIf="isInvalid('content')">Content is required.</small>
      </label>

      <div class="form-grid">
        <label>
          <span>Source</span>
          <input class="input" type="text" formControlName="generatedBy" placeholder="AI Assistant or team">
        </label>

        <label>
          <span>Version</span>
          <input class="input" type="text" formControlName="modelVersion" placeholder="Optional">
        </label>
      </div>

      <label>
        <span>Document link</span>
        <input class="input" type="url" formControlName="pdfUrl" placeholder="Optional document link">
      </label>

      <div class="actions">
        <a routerLink="/reports" class="btn btn-secondary">Cancel</a>
        <button class="btn btn-indigo" type="submit" [disabled]="isSaving">
          {{isSaving ? 'Saving...' : (isEditMode ? 'Save' : 'Create Report')}}
        </button>
      </div>
    </form>
  </div>
</section>
