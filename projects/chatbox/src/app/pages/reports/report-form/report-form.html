<section class="form-page">
  <a routerLink="/reports" class="back-link">Back to reports</a>

  <div class="form-card">
    <header>
      <p class="kicker">Reports</p>
      <h1>{{isEditMode ? 'Edit Report' : 'Create Report'}}</h1>
      <p>{{isEditMode ? 'Update the report metadata and content.' : 'Create a report draft without fake generated values.'}}</p>
    </header>

    <div *ngIf="isLoading" class="loading-state">
      <div class="spinner"></div>
      <p>Loading report...</p>
    </div>

    <form *ngIf="!isLoading" [formGroup]="form" (ngSubmit)="save()">
      <div class="form-grid">
        <label>
          <span>Project ID</span>
          <input class="input" type="text" formControlName="projectId" placeholder="Project id">
          <small *ngIf="isInvalid('projectId')">Project ID is required.</small>
        </label>

        <label>
          <span>Report type</span>
          <select class="input" formControlName="reportType">
            <option value="General">General</option>
            <option value="Market">Market</option>
            <option value="Financial">Financial</option>
            <option value="Technical">Technical</option>
          </select>
        </label>
      </div>

      <label>
        <span>Title</span>
        <input class="input" type="text" formControlName="title" placeholder="Report title">
        <small *ngIf="isInvalid('title')">Title is required.</small>
      </label>

      <label>
        <span>Summary</span>
        <textarea class="input" rows="3" formControlName="summary" placeholder="Short report summary"></textarea>
      </label>

      <label>
        <span>Content</span>
        <textarea class="input" rows="8" formControlName="content" placeholder="Report content"></textarea>
        <small *ngIf="isInvalid('content')">Content is required.</small>
      </label>

      <div class="form-grid">
        <label>
          <span>Generated by</span>
          <input class="input" type="text" formControlName="generatedBy" placeholder="manual or model name">
        </label>

        <label>
          <span>Model version</span>
          <input class="input" type="text" formControlName="modelVersion" placeholder="Empty until backend model returns it">
        </label>
      </div>

      <label>
        <span>PDF URL</span>
        <input class="input" type="url" formControlName="pdfUrl" placeholder="Empty until a PDF is generated">
      </label>

      <div class="actions">
        <a routerLink="/reports" class="btn btn-secondary">Cancel</a>
        <button class="btn btn-indigo" type="submit" [disabled]="isSaving">
          {{isSaving ? 'Saving...' : (isEditMode ? 'Save Changes' : 'Create Report')}}
        </button>
      </div>
    </form>
  </div>
</section>
