<div class="forgot-password-container">
  <div class="forgot-password-card">
    <div class="card-header">
      <h1>Reset password</h1>
      <p *ngIf="!submitted">Enter your email address to receive a reset link.</p>
      <p *ngIf="submitted" class="success-message">
        A reset link has been sent to {{ email }}
      </p>
    </div>

    <div class="card-body" *ngIf="!submitted">
      <form (ngSubmit)="submit()">
        <div class="form-group">
          <label for="email">Email address</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="you@example.com"
            required
            class="form-input"
          />
        </div>

        <button type="submit" class="btn-primary btn-block" [disabled]="loading || !email">
          <span *ngIf="!loading">Send link</span>
          <span *ngIf="loading">Sending...</span>
        </button>
      </form>

      <div class="form-footer">
        <a routerLink="/login" class="link">Back to sign in</a>
      </div>
    </div>

    <div class="card-body" *ngIf="submitted">
      <div class="success-content">
        <div class="success-icon">✓</div>
        <h2>Check your email</h2>
        <p>
          We sent a reset link to
          <strong>{{ email }}</strong>
        </p>
        <p class="help-text">
          Click the link in the email to create a new password.
          The link expires in 24 hours.
        </p>

        <button (click)="backToLogin()" class="btn-primary btn-block">
          Back to sign in
        </button>

        <div class="resend-section">
          <p>Did not receive it?</p>
          <button (click)="submit()" type="button" class="btn-link">
            Resend email
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
