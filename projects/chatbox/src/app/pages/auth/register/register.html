<div class="auth-layout">
  <div class="auth-bg-gradient"></div>
  
  <a routerLink="/" class="top-nav-back">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to Welcome
  </a>

  <div class="auth-card-wrapper">
    <div class="auth-card">
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Join the NexusAI global network</p>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        
        <div class="form-group">
          <label class="form-label">I am a...</label>
          <div class="role-selector">
            <label class="role-card" [class.active]="registerForm.get('role')?.value === 'entrepreneur'">
              <input type="radio" formControlName="role" value="entrepreneur" style="display: none;">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
              <span>Entrepreneur</span>
            </label>
            <label class="role-card" [class.active]="registerForm.get('role')?.value === 'specialist'">
              <input type="radio" formControlName="role" value="specialist" style="display: none;">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
              <span>Specialist</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Full Name</label>
          <div class="form-input-wrap">
            <input type="text" formControlName="fullName" class="form-input" placeholder="Enter your full name">
          </div>
          <div *ngIf="registerForm.get('fullName')?.touched && registerForm.get('fullName')?.invalid" class="form-error">
            Full name is required.
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="form-input-wrap">
            <input type="email" formControlName="email" class="form-input" placeholder="Enter your email">
          </div>
          <div *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid" class="form-error">
            Please enter a valid email address.
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="form-input-wrap">
            <input [type]="showPassword ? 'text' : 'password'" formControlName="password" class="form-input" placeholder="Create a password">
            <button type="button" class="pwd-toggle" (click)="togglePassword()">
              <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <div *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid" class="form-error">
            Password must be at least 6 characters.
          </div>
        </div>

        <button type="submit" class="auth-btn" [disabled]="registerForm.invalid || isLoading">
          <span *ngIf="!isLoading">Create Account</span>
          <span *ngIf="isLoading" style="display: flex; align-items: center; gap: 0.5rem;">
            <svg style="animation: spin 1s linear infinite;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" stroke-opacity="0.25"></circle><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"></path></svg>
            Creating account...
          </span>
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a routerLink="/login" class="auth-link">Sign in</a>
      </div>
    </div>
  </div>
</div>
