<div class="layout-wrapper flex h-full" (click)="closeDropdowns()">
  <!-- Sidebar -->
  <aside class="sidebar flex-col justify-between">
    <div>
      <div class="sidebar-header flex items-center gap-3 mb-10">
        <div class="logo-icon shadow-sm"></div>
        <span class="font-bold text-xl tracking-tight">NexusAI</span>
      </div>
      
      <div class="sidebar-group mb-6">
        <div class="text-xs font-semibold text-muted mb-3 uppercase tracking-widest px-3">Menu</div>
        <nav class="sidebar-nav flex-col gap-1">
          <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
            Dashboard
          </a>
          <a routerLink="/specialists" routerLinkActive="active" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Specialists
          </a>
          <a routerLink="/marketplace" routerLinkActive="active" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            Marketplace
          </a>
          <a routerLink="/chat" routerLinkActive="active" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Chat
            <span class="badge ml-auto bg-indigo text-white badge-count" *ngIf="unreadCount > 0">{{unreadCount}}</span>
          </a>
        </nav>
      </div>

      <div class="sidebar-group mb-6">
        <div class="text-xs font-semibold text-muted mb-3 uppercase tracking-widest px-3">Account</div>
        <nav class="sidebar-nav flex-col gap-1">
          <a routerLink="/profile/entrepreneur" routerLinkActive="active" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            My Profile
          </a>
        </nav>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="user-card flex items-center gap-3 p-2 rounded-lg hover-bg cursor-pointer transition-all" (click)="toggleUserMenu(); $event.stopPropagation()">
        <div class="avatar shadow-sm">J</div>
        <div class="overflow-hidden">
          <div class="text-sm font-semibold truncate">Jane Doe</div>
          <div class="text-xs text-muted truncate">jane.doe@acme.com</div>
        </div>
        <svg class="ml-auto text-muted" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <!-- User dropdown menu -->
      <div *ngIf="showUserMenu" class="user-dropdown" (click)="$event.stopPropagation()">
        <a routerLink="/profile/entrepreneur" class="dropdown-item" (click)="showUserMenu = false">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          My Profile
        </a>
        <a routerLink="/dashboard" class="dropdown-item" (click)="showUserMenu = false">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </a>
        <div style="height: 1px; background: var(--border-color); margin: 0.25rem 0;"></div>
        <a class="dropdown-item" (click)="logout()" style="color: var(--danger);">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </a>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content flex-1 flex-col">
    <!-- Topbar -->
    <header class="topbar flex items-center justify-between">
      <div class="search-wrapper flex items-center gap-2">
        <svg class="text-muted" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-input" placeholder="Search commands, projects..." [(ngModel)]="searchQuery" (keyup.enter)="onSearch()">
        <div class="flex gap-1 ml-4"><kbd>Ctrl</kbd><kbd>K</kbd></div>
      </div>
      <div class="topbar-actions flex items-center gap-4">
        <div style="position: relative;">
          <button class="icon-btn relative" (click)="toggleNotifications(); $event.stopPropagation()">
             <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
             <span class="notification-dot" *ngIf="unreadCount > 0"></span>
          </button>
          <!-- Notifications dropdown -->
          <div *ngIf="showNotifications" class="notif-dropdown" (click)="$event.stopPropagation()">
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; border-bottom: 1px solid var(--border-color);">
              <span style="font-weight: 600; font-size: 0.875rem;">Notifications</span>
              <button style="font-size: 0.75rem; color: var(--indigo-600); cursor: pointer; background: none; border: none;" (click)="markAllRead()">Mark all read</button>
            </div>
            <div *ngFor="let n of notifications" class="notif-item" [style.background]="n.read ? 'transparent' : 'rgba(99,102,241,0.04)'">
              <div style="width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;" [style.background]="n.read ? 'transparent' : 'var(--indigo-600)'"></div>
              <div>
                <div style="font-size: 0.8rem; color: var(--text-primary);">{{n.text}}</div>
                <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 2px;">{{n.time}}</div>
              </div>
            </div>
          </div>
        </div>
        <div class="v-divider"></div>
        <button class="btn btn-primary shadow-sm text-sm" (click)="deployProject()">Deploy Project</button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-container flex-1">
      <div class="page-inner">
         <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
